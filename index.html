<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LEXIS — Type to Defend the Galaxy</title>
  <meta name="description" content="LEXIS is a fast-paced typing shooter game. Type words to fire beams at enemy ships. Beat your high score!" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌌</text></svg>" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100vh;
      background: #05060F;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
    }

    #gameWrap {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── HUD ── */
    #ui {
      position: absolute; top: 0; left: 0; right: 0;
      pointer-events: none; padding: 14px 20px;
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    #score-display { color: #7DF9C8; font-size: 14px; line-height: 1.9; }
    #lives-display { font-size: 14px; text-align: right; }

    #typed-display {
      position: absolute; bottom: 54px; left: 50%; transform: translateX(-50%);
      color: #FFD700; font-size: 20px; font-weight: 700; letter-spacing: 6px;
      pointer-events: none; min-width: 160px; text-align: center; white-space: nowrap;
      text-shadow: 0 0 12px rgba(255,215,0,0.6);
    }

    #wave-display {
      position: absolute; top: 42%; left: 50%; transform: translate(-50%,-50%);
      color: #fff; font-size: 24px; font-weight: 500; text-align: center;
      pointer-events: none; opacity: 0; transition: opacity 0.5s;
      white-space: nowrap; line-height: 1.6;
    }

    #combo-display {
      position: absolute; bottom: 100px; right: 20px;
      color: #FFD700; font-size: 13px; pointer-events: none;
      opacity: 0; transition: opacity 0.3s;
    }

    /* ── LEVEL BAR ── */
    #level-bar {
      position: absolute; bottom: 0; left: 0; right: 0; height: 38px;
      background: rgba(0,0,0,0.85);
      border-top: 0.5px solid rgba(125,249,200,0.2);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; pointer-events: none;
    }
    #level-info  { color: #7DF9C8; font-size: 12px; letter-spacing: 1px; min-width: 160px; }
    #xp-bar-wrap { flex: 1; margin: 0 16px; height: 5px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    #xp-bar      { height: 100%; background: #7DF9C8; border-radius: 3px; width: 0%; transition: width 0.35s; }
    #speed-info  { color: #FF9F43; font-size: 12px; letter-spacing: 1px; min-width: 90px; text-align: right; }

    /* ── LEVEL-UP BANNER ── */
    #level-up-banner {
      position: absolute; top: 30%; left: 50%; transform: translate(-50%,-50%);
      text-align: center; pointer-events: none; opacity: 0; transition: opacity 0.4s;
    }
    #level-up-banner .lvl-title { color: #FFD700; font-size: 24px; font-weight: 700; letter-spacing: 4px; }
    #level-up-banner .lvl-sub   { color: #FF9F43; font-size: 14px; margin-top: 6px; letter-spacing: 1px; }

    /* ── OVERLAY ── */
    #overlay {
      position: absolute; inset: 0;
      background: rgba(5,6,15,0.96);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 12px; overflow-y: auto; padding: 24px 20px 20px;
    }
    #overlay h1 {
      color: #7DF9C8; font-size: 56px; font-weight: 700; letter-spacing: 14px;
      text-shadow: 0 0 40px rgba(125,249,200,0.6);
    }
    #overlay h2 { color: #7DF9C8; font-size: 20px; font-weight: 500; letter-spacing: 2px; }
    #overlay p  { color: #aaa; font-size: 14px; text-align: center; max-width: 480px; line-height: 1.8; }
    .score-final { color: #FFD700; font-size: 36px; font-weight: 700; }

    #overlay button {
      background: transparent; border: 0.5px solid #7DF9C8; color: #7DF9C8;
      padding: 12px 40px; font-size: 15px; cursor: pointer; border-radius: 4px;
      font-family: inherit; letter-spacing: 3px; margin-top: 8px;
      transition: background 0.2s;
    }
    #overlay button:hover { background: rgba(125,249,200,0.12); }

    /* ── STAT CARDS ── */
    .stat-row {
      display: flex; justify-content: space-between;
      width: 100%; max-width: 620px; gap: 10px;
    }
    .stat-box {
      flex: 1; background: rgba(255,255,255,0.04);
      border: 0.5px solid rgba(255,255,255,0.08);
      border-radius: 6px; padding: 10px 12px; text-align: center;
    }
    .stat-box .sv { color: #FFD700; font-size: 17px; font-weight: 700; }
    .stat-box .sl { color: #444; font-size: 10px; margin-top: 3px; letter-spacing: 1px; }

    /* ── PROGRESS CHART ── */
    #progressChart {
      width: 100%; max-width: 620px;
      background: rgba(255,255,255,0.025);
      border: 0.5px solid rgba(125,249,200,0.14);
      border-radius: 6px; padding: 16px; margin-top: 6px;
    }
  </style>
</head>
<body>

<div id="gameWrap">
  <canvas id="gameCanvas"></canvas>

  <!-- HUD -->
  <div id="ui">
    <div id="score-display">
      <div>SCORE <span id="score">0</span></div>
      <div>WAVE &nbsp;<span id="wave">1</span></div>
      <div>BEST &nbsp;<span id="best">0</span></div>
    </div>
    <div id="lives-display">
      <div id="hearts">❤️❤️❤️</div>
      <div style="font-size:10px;color:#555;margin-top:2px;letter-spacing:1px">SHIELDS</div>
    </div>
  </div>

  <div id="typed-display"></div>
  <div id="wave-display"></div>
  <div id="combo-display"></div>

  <div id="level-up-banner">
    <div class="lvl-title" id="lvl-title"></div>
    <div class="lvl-sub"   id="lvl-sub"></div>
  </div>

  <div id="level-bar">
    <div id="level-info">LVL 1 — RECRUIT</div>
    <div id="xp-bar-wrap"><div id="xp-bar"></div></div>
    <div id="speed-info">SPEED 1.0×</div>
  </div>

  <!-- Start / Game-Over Overlay -->
  <div id="overlay">
    <div style="font-size:56px;margin-bottom:4px">🌌</div>
    <h1>LEXIS</h1>
    <p style="color:#444;font-size:12px;letter-spacing:3px">TYPE TO DEFEND THE GALAXY</p>
    <p style="margin-top:10px">
      Type words to fire at enemy ships — each correct letter fires an instant beam!<br>
      Speed increases <span style="color:#FF9F43">+20%</span> every 3 waves.
    </p>
    <p style="color:#444;font-size:12px">No mouse needed — just start typing</p>
    <button id="startBtn">LAUNCH MISSION</button>
    <div id="historyPreview"></div>
  </div>
</div>

<script src="words.js"></script>
<script src="game.js"></script>
</body>
</html>
